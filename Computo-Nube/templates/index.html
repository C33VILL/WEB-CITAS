<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Veterinaria - Agendar Cita</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h2 class="text-center">🐾 Agendar Cita Veterinaria</h2>
        <div class="card shadow p-4 mt-4">
            <form action="/agendar" method="POST">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label>Nombre del Dueño</label>
                        <input type="text" name="dueno" class="form-control" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label>Nombre de la Mascota</label>
                        <input type="text" name="mascota" class="form-control" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label>Servicio</label>
                    <select name="servicio" class="form-control">
                        <option value="Consulta General">Consulta General</option>
                        <option value="Vacunación">Vacunación</option>
                        <option value="Estética">Estética</option>
                        <option value="Cirugía">Cirugía</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label>Fecha y Hora</label>
                    <input type="datetime-local" name="fecha" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>Notas adicionales</label>
                    <textarea name="mensaje" class="form-control"></textarea>
                </div>
                <button type="submit" class="btn btn-primary w-100">Confirmar Cita</button>
            </form>
        </div>
        <div class="text-center mt-3">
            <a href="/citas">Ver lista de citas agendadas</a>
        </div>
    </div>
</body>
</html>
<div class="container mt-4">
    <h2 class="text-center">🐾 Registro de Paciente</h2>
    <form action="/agendar" method="POST" class="card p-4 mt-3 shadow">
        <div class="row">
            <div class="col-md-6 mb-3">
                <label>Dueño</label>
                <input type="text" name="dueno" class="form-control" placeholder="Nombre completo" required>
            </div>
            <div class="col-md-3 mb-3">
                <label>Teléfono</label>
                <input type="tel" name="telefono" class="form-control" required>
            </div>
            <div class="col-md-3 mb-3">
                <label>Email</label>
                <input type="email" name="email" class="form-control" required>
            </div>
        </div>
        <div class="row">
            <div class="col-md-4 mb-3">
                <label>Nombre Mascota</label>
                <input type="text" name="mascota" class="form-control" required>
            </div>
            <div class="col-md-4 mb-3">
                <label>Especie</label>
                <select name="especie" class="form-select">
                    <option value="Perro">Perro</option>
                    <option value="Gato">Gato</option>
                    <option value="Ave">Ave</option>
                    <option value="Otro">Otro</option>
                </select>
            </div>
            <div class="col-md-2 mb-3">
                <label>Raza</label>
                <input type="text" name="raza" class="form-control">
            </div>
            <div class="col-md-2 mb-3">
                <label>Edad (años)</label>
                <input type="number" name="edad" class="form-control">
            </div>
        </div>
        <div class="row">
            <div class="col-md-6 mb-3">
                <label>Servicio</label>
                <select name="servicio" class="form-select">
                    <option>Consulta General</option>
                    <option>Desparasitación</option>
                    <option>Urgencias</option>
                </select>
            </div>
            <div class="col-md-6 mb-3">
                <label>Fecha y Hora</label>
                <input type="datetime-local" name="fecha" class="form-control" required>
            </div>
        </div>
        <div class="mb-3">
            <label>Motivo de la consulta</label>
            <textarea name="mensaje" class="form-control" rows="2"></textarea>
        </div>
        <button type="submit" class="btn btn-success">Agendar Cita</button>
    </form>
</div>
