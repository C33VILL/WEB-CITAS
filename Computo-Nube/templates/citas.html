<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Listado de Citas</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <h2>Agenda de Pacientes</h2>
    <table class="table table-striped mt-4">
        <thead class="table-dark">
            <tr>
                <th>Mascota</th>
                <th>Dueño</th>
                <th>Servicio</th>
                <th>Fecha</th>
                <th>Notas</th>
            </tr>
        </thead>
        <tbody>
            {% for cita in citas %}
            <tr>
                <td>{{ cita.nombre_mascota }}</td>
                <td>{{ cita.nombre_dueno }}</td>
                <td>{{ cita.servicio }}</td>
                <td>{{ cita.fecha }}</td>
                <td>{{ cita.mensaje }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <a href="/" class="btn btn-secondary">Regresar</a>
</body>
<script src="{{ url_for('static', filename='js/auth.js') }}"></script>
<script>
    // Ejecutar inmediatamente antes de que cargue el resto de la página
    if (!Auth.isAuthenticated()) {
        window.location.href = '/login';
    } else {
        document.addEventListener('DOMContentLoaded', () => {
            document.body.style.display = 'block'; // Mostramos el contenido si es válido
        });
    }
</script>

<style>
    /* Evita el "parpadeo" de contenido protegido */
    body { display: none; } 
</style>
</html>
