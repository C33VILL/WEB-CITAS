<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veterinaria - Acceso Administrativo</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    <style>
        /* Estilos específicos para la pantalla de login */
        .login-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #4e73df 0%, #1cc88a 100%);
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            border-radius: 20px;
            background: white;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }
        .error-message {
            display: none;
            color: #e74a3b;
            font-size: 0.9rem;
            margin-top: 10px;
            text-align: center;
            animation: shake 0.4s;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-card container">
        <div class="text-center mb-4">
            <span class="logo-vet" style="font-size: 4rem; display: block;">🔐</span>
            <h3 class="fw-bold text-dark">Panel Admin</h3>
            <p class="text-muted">Ingresa tus credenciales</p>
        </div>

        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label">Usuario</label>
                <input type="text" id="username" class="form-control" placeholder="Ej: admin" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>
            <div id="errorBox" class="error-message">
                ⚠️ Usuario o contraseña incorrectos
            </div>
            <button type="submit" class="btn btn-primary w-100 mt-4">
                Iniciar Sesión
            </button>
        </form>
        
        <div class="text-center mt-3">
            <a href="/" class="text-decoration-none text-muted small">← Volver al inicio</a>
        </div>
    </div>
</div>

<script>
    const loginForm = document.getElementById('loginForm');
    const errorBox = document.getElementById('errorBox');

    loginForm.addEventListener('submit', (e) => {
        e.preventDefault();
        
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;

        // --- SIMULACIÓN DE AUTENTICACIÓN ---
        // En un entorno real, esto se validaría contra la base de datos de Flask
        if (user === 'admin' && pass === 'admin123') {
            
            // Gestión de Estado de Cliente (Local Storage)
            const sessionData = {
                username: user,
                token: 'session_' + Math.random().toString(36).substr(2),
                loginTime: new Date().getTime()
            };
            
            localStorage.setItem('vet_auth_state', JSON.stringify(sessionData));

            // Animación de salida exitosa
            document.querySelector('.login-card').style.opacity = '0';
            document.querySelector('.login-card').style.transform = 'scale(0.9)';
            document.querySelector('.login-card').style.transition = 'all 0.5s ease';

            setTimeout(() => {
                window.location.href = '/citas'; // Redirigir al dashboard
            }, 500);

        } else {
            // Mostrar error con animación
            errorBox.style.display = 'block';
            document.getElementById('password').value = '';
            
            setTimeout(() => {
                errorBox.style.animation = 'none';
                void errorBox.offsetWidth; // Trigger reflow para reiniciar animación
                errorBox.style.animation = 'shake 0.4s';
            }, 10);
        }
    });

    // Verificar si ya hay una sesión activa al cargar
    window.onload = () => {
        const savedSession = localStorage.getItem('vet_auth_state');
        if (savedSession) {
            window.location.href = '/citas';
        }
    };
</script>

</body>
</html>
